<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Orbitron:wght@400;500;600;700;800;900&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error": "#ffb4ab",
            "on-primary": "#601400",
            "on-secondary": "#3d2f00",
            "primary-fixed-dim": "#ffb5a1",
            "surface-variant": "#39342f",
            "on-secondary-fixed-variant": "#584400",
            "on-error-container": "#ffdad6",
            "surface-bright": "#3d3834",
            "surface": "#16130f",
            "secondary-fixed-dim": "#f1c100",
            "on-error": "#690005",
            "secondary-container": "#fecb00",
            "surface-container": "#231f1b",
            "background": "#16130f",
            "on-secondary-container": "#6e5700",
            "inverse-surface": "#eae1da",
            "tertiary-fixed-dim": "#48e08b",
            "tertiary-fixed": "#69fea5",
            "primary-fixed": "#ffdbd1",
            "tertiary-container": "#00a65e",
            "outline": "#ad887e",
            "error-container": "#93000a",
            "secondary": "#ffecc0",
            "primary-container": "#ff5626",
            "on-tertiary-fixed": "#00210e",
            "surface-container-low": "#1f1b17",
            "inverse-primary": "#b12d00",
            "surface-tint": "#ffb5a1",
            "inverse-on-surface": "#34302b",
            "surface-container-lowest": "#110e0a",
            "on-primary-container": "#541000",
            "surface-container-high": "#2e2925",
            "on-primary-fixed-variant": "#882000",
            "on-primary-fixed": "#3b0900",
            "on-surface": "#eae1da",
            "surface-dim": "#16130f",
            "secondary-fixed": "#ffe08b",
            "on-tertiary": "#00391c",
            "on-background": "#eae1da",
            "on-tertiary-container": "#003118",
            "surface-container-highest": "#39342f",
            "on-surface-variant": "#e7bdb2",
            "on-tertiary-fixed-variant": "#00522c",
            "on-secondary-fixed": "#241a00",
            "outline-variant": "#5d4038",
            "tertiary": "#48e08b",
            "primary": "#ffb5a1"
          },
          fontFamily: {
            "headline": ["Orbitron"],
            "body": ["Manrope"],
            "label": ["Space Grotesk"]
          },
          borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .kinetic-glass {
      background: rgba(28, 24, 20, 0.8);
      backdrop-filter: blur(20px);
    }
    .fuego-border {
      border: 1px solid #ffb5a1;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- Background Layer (Lobby Context) -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-tr from-surface-container-lowest via-surface-dim to-surface-container-low"></div>
<div class="absolute inset-0 opacity-20" data-alt="Abstract dark industrial geometry background pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCHOGdqbub2ApvBII5ZqLyl0sWXUb5L8pHyDuHh6BM31bR1DqZim_s_ZCQoUddPJSX9jZdyY2lrNnE5r9HZLKbErHF9y6vPlxPZbb_4X1ra3OelVIM3IlQWYEElSQ1LgZUKA33hnvhqlJlRAlROxwHJmHdH4FT-4ZWH23en39iapmknAh85aCUOKLq0Uk-q-MBYMy4YBSqDFWCAxu5TBcCuQn8etcdeFNU9MBopmzP3HoMe1nbr66a7KmBltj2gIs44nGZd7iPer_o'); background-size: cover;"></div>
<!-- Top Bar Component -->
<header class="flex justify-between items-center w-full px-6 h-16 bg-[#16130f] fixed top-0 z-50">
<div class="text-2xl font-black text-[#ffb5a1] tracking-widest font-headline">KINETIC_LOBBY</div>
<div class="flex gap-8">
<span class="font-['Space_Grotesk'] tracking-[0.05rem] uppercase text-sm font-bold text-[#ffb5a1] border-b-2 border-[#ffb5a1]">Lobby</span>
<span class="font-['Space_Grotesk'] tracking-[0.05rem] uppercase text-sm font-bold text-[#39342f] hover:bg-[#1f1b17] transition-colors duration-150 cursor-pointer">Arsenal</span>
<span class="font-['Space_Grotesk'] tracking-[0.05rem] uppercase text-sm font-bold text-[#39342f] hover:bg-[#1f1b17] transition-colors duration-150 cursor-pointer">Operations</span>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-[#ffb5a1]">settings</span>
<span class="material-symbols-outlined text-[#ffb5a1]">close</span>
</div>
</header>
<!-- Content Placeholder -->
<main class="pt-24 px-24 grid grid-cols-12 gap-8 opacity-40 grayscale">
<div class="col-span-8 space-y-8">
<div class="h-96 bg-surface-container-low fuego-border p-1">
<div class="w-full h-full bg-surface-container flex items-center justify-center">
<span class="font-headline text-surface-container-highest text-6xl tracking-tighter uppercase">Squad_Deployment</span>
</div>
</div>
</div>
<div class="col-span-4 space-y-4">
<div class="h-48 bg-surface-container-high"></div>
<div class="h-48 bg-surface-container-high"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-background/60 backdrop-blur-sm">
<!-- Private Game Modal -->
<div class="w-full max-w-xl kinetic-glass fuego-border relative p-10 flex flex-col gap-8 shadow-2xl">
<!-- Close Button -->
<button class="absolute top-6 right-6 text-primary hover:text-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
<!-- Header -->
<div class="space-y-1">
<h2 class="font-headline text-3xl font-black tracking-tighter text-primary uppercase">Join Private</h2>
<div class="h-1 w-12 bg-primary"></div>
</div>
<!-- Input Section -->
<div class="space-y-4">
<label class="font-label text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase">Enter Room Code</label>
<div class="relative group">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary group-focus-within:w-2 transition-all"></div>
<input class="w-full bg-surface-container-highest border-none text-on-surface font-label text-xl tracking-widest px-6 py-5 focus:ring-0 focus:outline-none placeholder:text-surface-container-highest/10 placeholder:opacity-30" placeholder="XJ9-KINETIC-00" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-weight="fill">verified</span>
<span class="font-label text-xs text-primary font-bold">MATCH FOUND</span>
</div>
</div>
</div>
<!-- Search Result / Status Info -->
<div class="bg-surface-container-low p-6 flex justify-between items-center">
<div class="flex flex-col">
<span class="font-label text-[10px] text-outline tracking-widest uppercase">Room Availability</span>
<span class="font-headline text-xl text-secondary tracking-tight uppercase">2/2 Players | 4 Spectators</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-error shadow-[0_0_8px_#FF4444]"></div>
<span class="font-label text-xs text-error font-bold uppercase tracking-widest">Match In Progress</span>
</div>
</div>
<!-- Action Cluster -->
<div class="grid grid-cols-2 gap-4">
<!-- Join Button (Disabled Contextually) -->
<button class="col-span-2 group relative overflow-hidden bg-primary-container h-14 flex items-center justify-center transition-all hover:bg-primary opacity-50 cursor-not-allowed">
<span class="relative z-10 font-label font-black text-on-primary-container text-sm tracking-[0.2em] uppercase">Join Match (Full)</span>
</button>
<!-- Spectate Button -->
<button class="bg-transparent border border-secondary text-secondary font-label font-bold text-xs tracking-[0.15em] uppercase h-14 hover:bg-secondary/10 transition-all flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">visibility</span>
          Join as Spectator
        </button>
<!-- Availability / Info -->
<button class="bg-surface-container-highest text-on-surface-variant font-label font-bold text-xs tracking-[0.15em] uppercase h-14 flex items-center justify-center gap-2 hover:bg-surface-bright transition-all">
<span class="material-symbols-outlined">refresh</span>
          Refresh Status
        </button>
</div>
<!-- Footer Detail -->
<div class="flex justify-between items-center pt-2">
<p class="font-body text-[10px] text-outline uppercase tracking-widest">Secure Handshake: <span class="text-primary">ACTIVE</span></p>
<p class="font-body text-[10px] text-outline uppercase tracking-widest">Region: <span class="text-on-surface">EU-WEST-1</span></p>
</div>
</div>
</div>
<!-- Side Navigation (Suppressed per rule but included visually as shell) -->
<nav class="fixed left-0 top-0 h-full flex flex-col items-center py-8 z-40 bg-[#110e0a] w-20 opacity-20 pointer-events-none">
<div class="flex flex-col gap-10 items-center">
<div class="w-10 h-10 bg-[#ffb5a1] text-[#601400] flex items-center justify-center">
<span class="material-symbols-outlined">grid_view</span>
</div>
<span class="material-symbols-outlined text-[#39342f]">pentagon</span>
<span class="material-symbols-outlined text-[#39342f]">military_tech</span>
<span class="material-symbols-outlined text-[#39342f]">inventory_2</span>
</div>
</nav>
</body></html>
